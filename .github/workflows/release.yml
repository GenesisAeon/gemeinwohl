name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build hatchling twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  run-tests:
    name: Run full test suite before release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with dev extras
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=gemeinwohl --cov-fail-under=99

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, run-tests]
    environment: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docs:
    name: Deploy documentation
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install doc dependencies
        run: pip install -e ".[docs]"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "gemeinwohl v${{ steps.version.outputs.VERSION }}"
          body: |
            ## gemeinwohl v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG](https://github.com/GenesisAeon/gemeinwohl/blob/main/docs/changelog.md)
            for details.

            ### Install

            ```bash
            pip install gemeinwohl==${{ steps.version.outputs.VERSION }}
            pip install "gemeinwohl[full-stack]==${{ steps.version.outputs.VERSION }}"
            ```

            ### Zenodo DOI

            This release is archived at Zenodo:
            [doi.org/10.5281/zenodo.gemeinwohl](https://doi.org/10.5281/zenodo.gemeinwohl)
          files: dist/*
          draft: false
          prerelease: false
